<svg viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#374151"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="800" fill="#f8fafc"/>
  <text x="500" y="35" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">InvoSense AI — Use Case Diagram</text>

  <!-- System boundary -->
  <rect x="230" y="70" width="700" height="680" rx="14" fill="none" stroke="#9ca3af" stroke-width="2" stroke-dasharray="8,5"/>
  <text x="580" y="95" text-anchor="middle" font-size="14" font-weight="700" fill="#4b5563">InvoSense AI System</text>

  <!-- Actor: stick figure -->
  <g>
    <circle cx="110" cy="150" r="18" fill="#374151"/>
    <line x1="110" y1="168" x2="110" y2="230" stroke="#374151" stroke-width="4"/>
    <line x1="110" y1="185" x2="75" y2="215" stroke="#374151" stroke-width="4"/>
    <line x1="110" y1="185" x2="145" y2="215" stroke="#374151" stroke-width="4"/>
    <line x1="110" y1="230" x2="80" y2="270" stroke="#374151" stroke-width="4"/>
    <line x1="110" y1="230" x2="140" y2="270" stroke="#374151" stroke-width="4"/>
    <text x="110" y="292" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Finance User</text>
  </g>

  <!-- Use case ovals -->
  <!-- UC1 Upload -->
  <ellipse cx="420" cy="130" rx="140" ry="42" fill="#4c3575"/>
  <text x="420" y="135" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Upload Invoice</text>

  <!-- UC2 Extract -->
  <ellipse cx="420" cy="230" rx="150" ry="42" fill="#92400e"/>
  <text x="420" y="235" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Extract Invoice Data</text>

  <!-- UC3 Fraud detect -->
  <ellipse cx="420" cy="330" rx="160" ry="42" fill="#7a2e2e"/>
  <text x="420" y="326" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffffff">Detect Duplicate /</text>
  <text x="420" y="343" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffffff">Fraud Risk</text>

  <!-- UC4 View explanation -->
  <ellipse cx="420" cy="430" rx="160" ry="42" fill="#7a2e2e"/>
  <text x="420" y="435" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">View Risk Explanation</text>

  <!-- UC5 Dashboard -->
  <ellipse cx="420" cy="530" rx="150" ry="42" fill="#065f46"/>
  <text x="420" y="535" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">View Dashboard Summary</text>

  <!-- UC6 Ask question -->
  <ellipse cx="420" cy="630" rx="160" ry="42" fill="#1d4ed8"/>
  <text x="420" y="625" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffffff">Ask Natural-Language</text>
  <text x="420" y="642" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffffff">Question</text>

  <!-- UC7 Receive answer -->
  <ellipse cx="420" cy="720" rx="160" ry="42" fill="#1d4ed8"/>
  <text x="420" y="715" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffffff">Receive Conversational</text>
  <text x="420" y="732" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffffff">Answer</text>

  <!-- Actor to primary use cases -->
  <line x1="145" y1="200" x2="290" y2="140" stroke="#374151" stroke-width="2"/>
  <line x1="145" y1="230" x2="270" y2="530" stroke="#374151" stroke-width="2"/>
  <line x1="145" y1="215" x2="260" y2="630" stroke="#374151" stroke-width="2"/>

  <!-- Sequential includes -->
  <line x1="420" y1="172" x2="420" y2="188" stroke="#374151" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="420" y1="272" x2="420" y2="288" stroke="#374151" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="420" y1="372" x2="420" y2="388" stroke="#374151" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="420" y1="662" x2="420" y2="678" stroke="#374151" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- External services (right column) -->
  <rect x="720" y="110" width="180" height="55" rx="8" fill="#e5e7eb" stroke="#9ca3af"/>
  <text x="810" y="133" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">Groq LLM</text>
  <text x="810" y="150" text-anchor="middle" font-size="10.5" fill="#4b5563">Extraction Prompt</text>

  <rect x="720" y="310" width="180" height="55" rx="8" fill="#e5e7eb" stroke="#9ca3af"/>
  <text x="810" y="333" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">Groq LLM</text>
  <text x="810" y="350" text-anchor="middle" font-size="10.5" fill="#4b5563">Fraud Prompt</text>

  <rect x="720" y="700" width="180" height="55" rx="8" fill="#e5e7eb" stroke="#9ca3af"/>
  <text x="810" y="723" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">Groq LLM</text>
  <text x="810" y="740" text-anchor="middle" font-size="10.5" fill="#4b5563">Chat Prompt</text>

  <rect x="720" y="500" width="180" height="55" rx="8" fill="#e5e7eb" stroke="#9ca3af"/>
  <text x="810" y="523" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">MongoDB Atlas</text>
  <text x="810" y="540" text-anchor="middle" font-size="10.5" fill="#4b5563">Invoice records</text>

  <line x1="580" y1="140" x2="720" y2="138" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="580" y1="335" x2="720" y2="338" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="570" y1="720" x2="720" y2="728" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="570" y1="530" x2="720" y2="527" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>
