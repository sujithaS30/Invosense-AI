spring.application.name=invosense-ai

# ---- MongoDB (Atlas) ----
# Get this URI from MongoDB Atlas > Connect > Drivers
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/invosense}

# ---- LLM API (Groq - used for extraction, fraud reasoning, chat) ----
groq.api.key=${GROQ_API_KEY:}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.1-8b-instant

# ---- Embedding API (Gemini - used for vector search) ----
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-embedding-001:embedContent

# ---- File upload ----
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

server.port=8080

# CORS - allow React dev server
cors.allowed-origins=http://localhost:3000